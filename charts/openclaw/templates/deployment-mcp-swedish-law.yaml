apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-swedish-law
  labels:
    app: mcp-swedish-law
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-swedish-law
  template:
    metadata:
      labels:
        app: mcp-swedish-law
    spec:
      containers:
        - name: mcp-swedish-law
          image: "{{ .Values.mcp.swedishLaw.image }}:{{ .Values.mcp.swedishLaw.tag }}"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
