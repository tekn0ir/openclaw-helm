apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  labels:
    app: openclaw
data:
  openclaw.json: |-
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "trustedProxies": ["172.17.0.1", "10.42.0.0/16"],
        "auth": {
          "mode": "trusted-proxy",
          "trustedProxy": {
            "userHeader": "X-Auth-Request-Email",
            "requiredHeaders": ["X-Auth-Request-Access-Token"]
          }
        },
        "controlUi": {
          "enabled": true,
          "allowInsecureAuth": true,
          "allowedOrigins": [
            "http://rtx2000-pro-bw-se.teknoir:31789",
            "https://openclaw-rtx2000-pro-bw-se-teknoir-demo.teknoir.cloud",
            "https://openclaw.teknoir.cloud"
          ]
        }
      },
      "models": {
        "providers": {
          "ollama": {
            "apiKey": "ollama-local",
            "baseUrl": "http://openclaw-ollama:11434",
            "api": "ollama",
            "models": [
              {
                "id": "gpt-oss:latest",
                "name": "gpt-oss:latest",
                "reasoning": true,
                "input": [
                  "text",
                  "image"
                ],
                "cost": {
                  "input": 0,
                  "output": 0,
                  "cacheRead": 0,
                  "cacheWrite": 0
                },
                "contextWindow": 260000,
                "maxTokens": 260000
              }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "workspace": "~/.openclaw/workspace",
          "model": {
            "primary": "ollama/gpt-oss:latest"
          },
          "pdfModel": {
            "primary": "ollama/gpt-oss:latest"
          },
          "imageModel": {
            "primary": "ollama/gpt-oss:latest"
          }
        },
        "list": [
          {
            "id": "default",
            "name": "OpenClaw Assistant",
            "workspace": "~/.openclaw/workspace"
          }
        ]
      },
      "plugins": {
        "allow": ["openclaw-mcp-bridge"],
        "entries": {
          "openclaw-mcp-bridge": {
            "config": {
              "mode": "direct",
              "servers": {
                "mcp-swedish-law": {
                  "transport": "streamable-http",
                  "url": "http://mcp-swedish-law/mcp",
                  "description": "Swedish statutes and regulations"
                }
              },
              "toolPrefix": true
            }
          }
        }
      },
      "tools": {
        "allow": ["all"],
        "sandbox": {
          "tools": {
            "allow": ["all"]
          }
        }
      },
      "cron": { "enabled": true }
    }
  AGENTS.md: |-
    # OpenClaw Assistant

    You are a helpful AI assistant running in Kubernetes.
