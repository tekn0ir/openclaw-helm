{{- $existing := (lookup "v1" "Secret" .Release.Namespace "openclaw-secrets") -}}
{{- $data := dict "token" "" -}}
{{- if and $existing (hasKey $existing.data "OPENCLAW_GATEWAY_TOKEN") -}}
{{- $_ := set $data "token" (index $existing.data "OPENCLAW_GATEWAY_TOKEN" | b64dec) -}}
{{- else -}}
{{- $_ := set $data "token" (randAlphaNum 64) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
  labels:
    app: openclaw
type: Opaque
data:
  OPENCLAW_GATEWAY_TOKEN: {{ $data.token | b64enc }}
