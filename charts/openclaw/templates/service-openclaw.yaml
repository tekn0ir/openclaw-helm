apiVersion: v1
kind: Service
metadata:
  name: openclaw
  labels:
    app: openclaw
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "18789"
spec:
  type: NodePort
  selector:
    app: openclaw
  ports:
    - name: gateway
      port: 18789
      targetPort: 18789
      protocol: TCP
      nodePort: 31789
