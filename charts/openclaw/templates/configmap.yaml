apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  labels:
    app: openclaw
data:
  openclaw.json: |-
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "auth": {
          "mode": "password",
          "password": "openclaw"
        },
        "controlUi": {
          "enabled": true,
          "allowedOrigins": [
            "http://rtx2000-pro-bw-se.teknoir:31789",
            "https://openclaw-rtx2000-pro-bw-se-teknoir-demo.teknoir.cloud"
          ]
        }
      },
      "models": {
        "providers": {
          "ollama": {
            "apiKey": "ollama-local",
            "baseUrl": "http://openclaw-ollama:11434",
            "api": "ollama",
            "models": [
              {
                "id": "qwen3.5:latest",
                "name": "Qwen 3.5 9B",
                "reasoning": false,
                "input": ["text", "image"],
                "cost": { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 },
                "contextWindow": 262144,
                "maxTokens": 2621440
              }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "workspace": "~/.openclaw/workspace",
          "model": {
            "primary": "ollama/qwen3.5:latest"
          }
        },
        "list": [
          {
            "id": "default",
            "name": "OpenClaw Assistant",
            "workspace": "~/.openclaw/workspace"
          }
        ]
      },
      "cron": { "enabled": false }
    }
  AGENTS.md: |-
    # OpenClaw Assistant

    You are a helpful AI assistant running in Kubernetes.
